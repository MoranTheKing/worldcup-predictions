<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #060D1A; font-family: 'Heebo', sans-serif; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .swatch { border-radius: 10px; overflow: hidden; }
  .color { height: 64px; }
  .info { padding: 8px; background: #0D1B2E; border: 1px solid #1E2F4A; border-top: none; border-radius: 0 0 10px 10px; }
  .name { font-size: 11px; font-weight: 600; color: #EEF2FF; }
  .hex { font-size: 10px; color: #8899BB; margin-top: 2px; font-family: monospace; }
</style></head><body>
<div class="grid">
  <div class="swatch">
    <div class="color" style="background:#060D1A; border:1px solid #1E2F4A; border-radius:10px 10px 0 0;"></div>
    <div class="info"><div class="name">bg</div><div class="hex">#060D1A</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#0D1B2E; border-radius:10px 10px 0 0;"></div>
    <div class="info"><div class="name">surface</div><div class="hex">#0D1B2E</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#142338; border-radius:10px 10px 0 0;"></div>
    <div class="info"><div class="name">surface raised</div><div class="hex">#142338</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#003087; border-radius:10px 10px 0 0;"></div>
    <div class="info"><div class="name">navy</div><div class="hex">#003087</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#EEF2FF; border-radius:10px 10px 0 0;"></div>
    <div class="info"><div class="name">white</div><div class="hex">#EEF2FF</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#C8102E; border-radius:10px 10px 0 0;"></div>
    <div class="info"><div class="name">red (USA)</div><div class="hex">#C8102E</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#009A3D; border-radius:10px 10px 0 0;"></div>
    <div class="info"><div class="name">green (CAN)</div><div class="hex">#009A3D</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#1E2F4A; border-radius:10px 10px 0 0;"></div>
    <div class="info"><div class="name">border</div><div class="hex">#1E2F4A</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#8899BB; border-radius:10px 10px 0 0;"></div>
    <div class="info"><div class="name">fg2</div><div class="hex">#8899BB</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#4A6080; border-radius:10px 10px 0 0;"></div>
    <div class="info"><div class="name">fg3</div><div class="hex">#4A6080</div></div>
  </div>
</div>
</body></html>
