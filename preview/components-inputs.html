<!DOCTYPE html>
<html dir="rtl"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #060D1A; padding: 20px 24px; font-family: 'Heebo', sans-serif; direction: rtl; }
  .label { font-size: 10px; font-weight: 600; color: #4A6080; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; margin-top: 16px; }
  .col { display: flex; flex-direction: column; gap: 10px; max-width: 340px; }
  input, select {
    font-family: 'Heebo', sans-serif; font-size: 14px;
    background: #142338; border: 1.5px solid #1E2F4A;
    border-radius: 12px; color: #EEF2FF;
    padding: 11px 14px; outline: none; width: 100%; box-sizing: border-box;
  }
  input::placeholder { color: #4A6080; }
  .focused { border-color: #00E65A; box-shadow: 0 0 0 3px rgba(0,230,90,0.12); }
  .error-input { border-color: #C8102E; }
  .error-msg { font-size: 12px; color: #F87171; margin-top: -4px; }
  .score-input-row { display: flex; align-items: center; gap: 12px; }
  .score-input { width: 56px !important; text-align: center; font-size: 22px; font-weight: 700; padding: 8px !important; }
  .score-sep { font-size: 20px; color: #4A6080; font-weight: 700; }
</style></head><body>
  <div class="label">Text Inputs</div>
  <div class="col">
    <input type="email" placeholder="אימייל" />
    <input type="text" class="focused" placeholder="כינוי" value="מוראן" />
    <input type="password" class="error-input" placeholder="סיסמה" value="xxx" />
    <span class="error-msg">אימייל או סיסמה שגויים</span>
  </div>

  <div class="label">Score Prediction Input</div>
  <div class="score-input-row">
    <div style="font-size:13px;color:#8899BB;font-weight:600;flex:1;text-align:right;">ברזיל</div>
    <input class="score-input focused" type="number" value="2" min="0" max="20" />
    <span class="score-sep">—</span>
    <input class="score-input" type="number" placeholder="?" min="0" max="20" />
    <div style="font-size:13px;color:#8899BB;font-weight:600;flex:1;text-align:left;">ארגנטינה</div>
  </div>

  <div class="label">Dropdown / Picker</div>
  <div class="col">
    <div style="position:relative;">
      <div style="background:#142338; border:1.5px solid #00E65A; border-radius:12px; padding:11px 14px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 0 0 3px rgba(0,230,90,0.10);">
        <span style="font-size:14px;color:#EEF2FF;">ברזיל</span>
        <span style="font-size:11px;color:#4A6080;">▲</span>
      </div>
      <div style="position:absolute;top:calc(100%+4px);left:0;right:0;background:#142338;border:1px solid #2A4060;border-radius:12px;overflow:hidden;z-index:10;box-shadow:0 4px 16px rgba(0,0,0,0.5);">
        <div style="padding:8px;border-bottom:1px solid #1E2F4A;">
          <input type="text" placeholder="חיפוש..." style="border-radius:8px;padding:8px 12px;font-size:13px;" />
        </div>
        <div style="padding:6px 0;max-height:120px;overflow-y:auto;">
          <div style="padding:8px 14px;font-size:13px;color:#00E65A;font-weight:600;background:rgba(0,230,90,0.06);">ברזיל</div>
          <div style="padding:8px 14px;font-size:13px;color:#EEF2FF;">ארגנטינה</div>
          <div style="padding:8px 14px;font-size:13px;color:#EEF2FF;">צרפת</div>
        </div>
      </div>
    </div>
  </div>
</body></html>
